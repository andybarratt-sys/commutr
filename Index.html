<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Slaithwaite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { scrollbar-width: none; -ms-overflow-style: none; overflow-x: hidden; }
html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
body { font-family: 'Onest', sans-serif; background: #fff; min-height: 100vh; -webkit-font-smoothing: antialiased; }

.board { max-width: 393px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: #fff; }

/* ── Fixed top ── */
.top { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 393px; z-index: 100; background: #fff; }

/* ── Nav — padding: 24px 24px 0, gap: 12px ── */
.nav { padding: calc(env(safe-area-inset-top) + 24px) 24px 0; display: flex; flex-direction: row; align-items: center; gap: 12px; }
.nav-spacer { flex: 1; }
.icon-btn { width: 40px; height: 40px; border-radius: 100px; background: rgba(26,26,26,0.1); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
.icon-btn:active { opacity: 0.7; }
.icon-btn svg { width: 24px; height: 24px; display: block; }

/* ── Header — padding: 24px 24px 32px, gap: 12px ── */
.header { padding: 24px 24px 32px; display: flex; flex-direction: column; gap: 12px; }
.station { font-size: 34px; font-weight: 600; line-height: 1.206; color: #1A1A1A; }
.tab-bar { display: flex; align-items: center; gap: 16px; }
.tab-btn { font-family: 'Onest', sans-serif; font-size: 22px; font-weight: 400; line-height: 1.273; color: #767676; background: none; border: none; border-bottom: 2px solid transparent; padding: 0 0 2px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.tab-btn.active { font-weight: 600; color: #1A1A1A; border-bottom-color: #1A1A1A; }

/* ── Status band — padding: 24px, gap: 4px ── */
.status-band { padding: 24px; display: flex; flex-direction: column; gap: 4px; background: #00189F; transition: background 0.4s ease; }
.status-band.warn { background: #FFCA00; }
.status-band.bad  { background: #D3131A; }
.status-updated { font-size: 16px; font-weight: 400; line-height: 1.3125; color: #fff; }
.status-band.warn .status-updated { color: #1A1A1A; }
.status-text { font-size: 16px; font-weight: 600; line-height: 1.3125; color: #fff; min-height: 1.3125em; }
.status-band.warn .status-text { color: #1A1A1A; }

/* ── Swipe ── */
.swipe-container { flex: 1; overflow: hidden; }
.swipe-track { display: flex; width: 200%; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); will-change: transform; }
.tab-panel { width: 50%; min-width: 0; }

/* ── Cards container — gap: 1px, bg: #F3F3F3 ── */
.cards { display: flex; flex-direction: column; gap: 1px; background: #F3F3F3; }

/* ── Card — padding: 16px 24px, gap: 8px ── */
.card { background: #fff; padding: 16px 24px; display: flex; flex-direction: column; gap: 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.card:active { background: #FAFAFA; }

/* Row 1 */
.card-row-top { display: flex; flex-direction: row; align-items: center; gap: 8px; }
.card-time-group { display: flex; flex-direction: row; align-items: center; gap: 8px; }
.card-time { font-size: 22px; font-weight: 600; line-height: 1.273; color: #1A1A1A; }
.card-exp  { font-size: 22px; font-weight: 400; line-height: 1.273; color: #1A1A1A; }
.card-chip-wrap { flex: 1; display: flex; justify-content: flex-end; }

/* Chips */
.chip { display: inline-flex; align-items: center; justify-content: center; padding: 4px 8px 3px; height: 24px; border-radius: 6px; font-family: 'Onest', sans-serif; font-size: 13px; font-weight: 600; line-height: 1.385; color: #1A1A1A; white-space: nowrap; border: 1px solid transparent; }
.chip.info { background: transparent; border-color: #D8DCF0; }
.chip.warn { background: #FFF5CC; }
.chip.bad  { background: #F5BFBF; }

/* Row 2 — gap: 6px */
.card-row-route { display: flex; flex-direction: row; align-items: center; gap: 6px; }
.card-prep { font-size: 16px; font-weight: 400; line-height: 1.3125; color: #767676; flex-shrink: 0; }
.card-dest { font-size: 16px; font-weight: 600; line-height: 1.3125; color: #767676; }

/* Row 3 */
.card-detail { font-size: 13px; font-weight: 400; line-height: 1.385; color: #767676; }

/* ── Empty ── */
.message { padding: 24px; font-size: 16px; color: #767676; text-align: center; }

/* ═══════════════════════════════════════
   BOTTOM SHEET
═══════════════════════════════════════ */
.sheet-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0);
  transition: background 0.35s ease;
  pointer-events: none;
}
.sheet-overlay.open {
  background: rgba(0,0,0,0.4);
  pointer-events: all;
}

.sheet {
  position: fixed; bottom: 0; left: 50%; z-index: 201;
  transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 393px;
  max-height: 90vh;
  background: #fff;
  border-radius: 32px 32px 0 0;
  display: flex; flex-direction: column;
  transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  overflow: hidden;
}
.sheet.open { transform: translateX(-50%) translateY(0); }

/* Sheet drag handle */
.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: #E0E0E0; margin: 12px auto 0;
  flex-shrink: 0;
}

/* Sheet nav — padding: 24px 24px 0 */
.sheet-nav {
  padding: 12px 24px 0;
  display: flex; flex-direction: row; align-items: center; gap: 12px;
  flex-shrink: 0;
}
.sheet-nav-spacer { flex: 1; }

/* Sheet header — padding: 24px 24px 32px, gap: 16px */
.sheet-header {
  padding: 24px 24px 32px;
  display: flex; flex-direction: column; gap: 16px;
  flex-shrink: 0;
}
.sheet-header-top {
  display: flex; flex-direction: column; gap: 8px;
}
.sheet-time-row {
  display: flex; flex-direction: row; align-items: baseline; gap: 8px;
}
.sheet-time-left {
  display: flex; flex-direction: row; align-items: center; gap: 8px;
}
/* Title 2 Emphasis */
.sheet-time { font-size: 22px; font-weight: 600; line-height: 1.273; color: #1A1A1A; }
/* Title 2 */
.sheet-exp  { font-size: 22px; font-weight: 400; line-height: 1.273; color: #1A1A1A; }
.sheet-direction { font-size: 22px; font-weight: 400; line-height: 1.273; color: #767676; flex: 1; }
/* Title 1 — Onest 600 28px */
.sheet-dest { font-size: 28px; font-weight: 600; line-height: 1.214; color: #1A1A1A; }

/* Sheet content — scrollable, padding: 0 24px 24px */
.sheet-content {
  padding: 0 24px calc(env(safe-area-inset-bottom) + 24px);
  overflow-y: auto; flex: 1;
  scrollbar-width: none;
}
.sheet-content::-webkit-scrollbar { display: none; }

/* ── Station node list ── */
.node-list { display: flex; flex-direction: column; }

.node-row {
  display: flex; flex-direction: row; align-items: center; gap: 16px;
}

/* The dot+line column — fixed 12px wide */
.node-track {
  display: flex; flex-direction: column; align-items: center;
  flex-shrink: 0; width: 12px;
}

/* Dot — 12×12 circle */
.node-dot {
  width: 12px; height: 12px; border-radius: 50%;
  flex-shrink: 0;
}
.node-dot.passed    { background: #00189F; }
.node-dot.reached   { background: #00189F; }
.node-dot.active    { background: #FFCA00; }
.node-dot.unreached { background: #F3F3F3; border: 1.5px solid #D0D0D0; }
.node-dot.origin-started   { background: #00189F; }
.node-dot.origin-unstarted { background: #F3F3F3; border: 1.5px solid #D0D0D0; }
.node-dot.end-reached   { background: #00189F; }
.node-dot.end-unreached { background: #F3F3F3; border: 1.5px solid #D0D0D0; }

/* Path — 2×24px vertical bar */
.node-path {
  width: 2px; height: 24px; flex-shrink: 0;
}
.node-path.complete  { background: #00189F; }
.node-path.started   { background: linear-gradient(to bottom, #00189F 50%, #F3F3F3 50%); }
.node-path.unstarted { background: #F3F3F3; }
.node-path.warn-started { background: linear-gradient(to bottom, #FFCA00 50%, #F3F3F3 50%); }

/* Station label — Title 2 Emphasis */
.node-label {
  font-size: 22px; font-weight: 600; line-height: 1.273; color: #1A1A1A;
  padding: 6px 0;
}
.node-label.grey { color: #767676; font-weight: 400; }
</style>
</head>
<body>
<div class="board">

  <!-- Fixed top -->
  <div class="top" id="top">
    <div class="nav">
      <button class="icon-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="nav-spacer"></div>
      <button class="icon-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 6H20M7 12H17M10 18H14" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="header">
      <div class="station">Slaithwaite</div>
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-dep" onclick="switchTab(0)">Departing</button>
        <button class="tab-btn"        id="tab-arr" onclick="switchTab(1)">Arriving</button>
      </div>
    </div>
    <div class="status-band" id="status-band">
      <div class="status-updated" id="status-updated">Loading...</div>
      <div class="status-text"    id="status-text"></div>
    </div>
  </div>

  <!-- Content -->
  <div class="swipe-container" id="swipe-container">
    <div class="swipe-track" id="swipe-track">
      <div class="tab-panel">
        <div class="cards" id="trains-dep"><div class="message">Fetching trains…</div></div>
      </div>
      <div class="tab-panel">
        <div class="cards" id="trains-arr"><div class="message">Fetching trains…</div></div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom sheet overlay -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>

<!-- Bottom sheet -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-nav">
    <div class="sheet-nav-spacer"></div>
    <button class="icon-btn" onclick="closeSheet()">
      <svg viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6L18 18" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="sheet-header">
    <div class="sheet-header-top">
      <div class="sheet-time-row">
        <div class="sheet-time-left">
          <span class="sheet-time" id="sheet-time"></span>
          <span class="sheet-exp"  id="sheet-exp"></span>
        </div>
        <span class="sheet-direction" id="sheet-direction"></span>
      </div>
      <div class="sheet-dest" id="sheet-dest"></div>
    </div>
    <div id="sheet-chip-wrap"></div>
  </div>
  <div class="sheet-content">
    <div class="node-list" id="node-list"></div>
  </div>
</div>

<script>
'use strict';

const WORKER = 'https://icy-art-aabb.andybarratt.workers.dev';
let depServices = [];
let arrServices = [];
let activeTab   = 0;
let headerTimer = null;

/* ── Layout ── */
function adjustTop() {
  document.getElementById('swipe-container').style.marginTop =
    document.getElementById('top').offsetHeight + 'px';
}

/* ── Tabs ── */
function switchTab(idx) {
  activeTab = idx;
  document.getElementById('tab-dep').classList.toggle('active', idx === 0);
  document.getElementById('tab-arr').classList.toggle('active', idx === 1);
  document.getElementById('swipe-track').style.transform =
    idx === 0 ? 'translateX(0)' : 'translateX(-50%)';
  clearTimeout(headerTimer);
  headerTimer = setTimeout(() => { updateBand(); adjustTop(); }, 500);
}

/* ── Swipe ── */
let tx = 0, ty = 0;
document.getElementById('swipe-container').addEventListener('touchstart', e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
}, { passive: true });
document.getElementById('swipe-container').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0 && activeTab === 0) switchTab(1);
    if (dx > 0 && activeTab === 1) switchTab(0);
  }
}, { passive: true });

/* ── XML helpers ── */
function getTag(xml, tag) {
  const m = xml.match(new RegExp(`<[^>]*:?${tag}[^>]*>([^<]*)<`));
  return m ? m[1].trim() : '';
}

function parseCallingPoints(block, tagName) {
  const re = new RegExp(`<${tagName}:callingPoint>([\\s\\S]*?)<\\/${tagName}:callingPoint>`, 'g');
  const pts = [];
  let m;
  while ((m = re.exec(block)) !== null) {
    const s = m[1];
    const get = tag => { const r = s.match(new RegExp(`<${tagName}:${tag}>([^<]*)<`)); return r ? r[1].trim() : ''; };
    pts.push({
      name: get('locationName'),
      st:   get('st'),
      et:   get('et'),
      at:   get('at'),
    });
  }
  return pts;
}

function parseServices(xml, type) {
  const re = /<lt8:service>([\s\S]*?)<\/lt8:service>/g;
  const out = [];
  let m;
  while ((m = re.exec(xml)) !== null) {
    const s    = m[1];
    const dest = s.match(/<lt5:destination>[\s\S]*?<lt4:locationName>([^<]+)<\/lt4:locationName>/);
    const orig = s.match(/<lt5:origin>[\s\S]*?<lt4:locationName>([^<]+)<\/lt4:locationName>/);
    const time = getTag(s, 'sta') || getTag(s, 'std');

    /* Previous calling points */
    let prevPoints = [];
    const prev = s.match(/<lt8:previousCallingPoints>([\s\S]*?)<\/lt8:previousCallingPoints>/);
    if (prev) prevPoints = parseCallingPoints(prev[1], 'lt4');

    /* Subsequent calling points */
    let nextPoints = [];
    const subseq = s.match(/<lt8:subsequentCallingPoints>([\s\S]*?)<\/lt8:subsequentCallingPoints>/);
    if (subseq) nextPoints = parseCallingPoints(subseq[1], 'lt4');

    /* Last seen for footnote */
    let lastSeen = null;
    for (const pt of prevPoints) {
      if (pt.at && pt.at !== 'No report' && pt.name) lastSeen = { loc: pt.name, at: pt.at };
    }
    const stopsAway = nextPoints.filter(p => !p.at).length;
    if (lastSeen) lastSeen.stopsAway = stopsAway;

    out.push({
      type, time,
      sortKey:     time.replace(':', ''),
      expected:    getTag(s, 'eta') || getTag(s, 'etd'),
      platform:    getTag(s, 'platform'),
      origin:      orig  ? orig[1]  : '',
      destination: dest  ? dest[1]  : '',
      serviceID:   getTag(s, 'serviceID'),
      lastSeen,
      prevPoints,
      nextPoints,
    });
  }
  return out;
}

/* ── Chip ── */
function chipFor(expected) {
  if (!expected) return null;
  const lo = expected.toLowerCase();
  if (lo === 'on time')   return { cls: 'info', text: 'On time' };
  if (lo === 'cancelled') return { cls: 'bad',  text: 'Cancelled' };
  if (/^\d{2}:\d{2}$/.test(expected)) return { cls: 'warn', text: 'Running late' };
  return null;
}

function chipHTML(chip) {
  return chip ? `<span class="chip ${chip.cls}">${chip.text}</span>` : '';
}

/* ── Detail label ── */
function detailLabel(ls) {
  const stops  = ls.stopsAway;
  const isTime = /^\d{2}:\d{2}$/.test(ls.at);
  if (stops === 0) return 'Arriving soon.';
  const stopStr = stops === 1 ? '1 more stop.' : `${stops} more stops.`;
  if (!isTime) return `Just departed ${ls.loc}, ${stopStr}`;
  const nowMin  = new Date().getHours() * 60 + new Date().getMinutes();
  const [h, mn] = ls.at.split(':').map(Number);
  const diff    = nowMin - (h * 60 + mn);
  const t       = diff <= 0 ? '' : diff === 1 ? ' 1 min ago' : diff < 60 ? ` ${diff} mins ago` : '';
  return `Departed ${ls.loc}${t}, ${stopStr}`;
}

/* ── Headline ── */
function headlineFor(services, tab) {
  if (!services.length) return { cls: '', text: '' };
  const toMins = t => { const [h, mn] = t.split(':').map(Number); return h * 60 + mn; };
  const nowMin = new Date().getHours() * 60 + new Date().getMinutes();
  const isDep  = tab === 0;

  const cancelled = services.filter(s => (s.expected || '').toLowerCase() === 'cancelled');
  const delayed   = services.filter(s => /^\d{2}:\d{2}$/.test(s.expected || ''));
  const upcoming  = services.filter(s => (s.expected || '').toLowerCase() !== 'cancelled')
                            .sort((a, b) => toMins(a.time) - toMins(b.time));
  const next = upcoming[0];

  if (cancelled.length && delayed.length) {
    const c = cancelled[0], lbl = isDep ? `to ${c.destination}` : `from ${c.origin}`;
    return { cls: 'bad', text: `The ${c.time} ${lbl} is cancelled, and ${delayed.length} train${delayed.length > 1 ? 's are' : ' is'} delayed.` };
  }
  if (cancelled.length) {
    const c = cancelled[0], lbl = isDep ? `to ${c.destination}` : `from ${c.origin}`;
    const nxt = next ? ` The ${next.time} ${isDep ? 'to ' + next.destination : 'from ' + next.origin} is your best bet.` : '';
    return { cls: 'bad', text: `The ${c.time} ${lbl} is cancelled.${nxt}` };
  }
  if (delayed.length) {
    const d = delayed[0], lbl = isDep ? `to ${d.destination}` : `from ${d.origin}`;
    return { cls: 'warn', text: `The ${d.time} ${lbl} is running late — now expected ${d.expected}.` };
  }
  if (next) {
    const away = toMins(next.time) - nowMin;
    const lbl  = isDep ? `to ${next.destination}` : `from ${next.origin}`;
    const plat = next.platform || '?';
    if (away <= 1) return { cls: '', text: `The ${next.time} ${lbl} is on time, arriving at Platform ${plat} soon.` };
    const when = away < 60 ? `in ${away} mins` : `at ${next.time}`;
    return { cls: '', text: `The ${next.time} ${lbl} is on time, arriving at Platform ${plat} ${when}.` };
  }
  return { cls: '', text: '' };
}

function updateBand() {
  const services = activeTab === 0 ? depServices : arrServices;
  const { cls, text } = headlineFor(services, activeTab);
  document.getElementById('status-band').className = `status-band${cls ? ' ' + cls : ''}`;
  document.getElementById('status-text').textContent = text;
}

/* ── Render cards ── */
function renderList(services, elId, tab) {
  const el    = document.getElementById(elId);
  const isDep = tab === 0;
  if (!services.length) { el.innerHTML = '<div class="message">No trains found</div>'; return; }

  el.innerHTML = services.map((s, i) => {
    const chip    = chipFor(s.expected);
    const expTime = /^\d{2}:\d{2}$/.test(s.expected || '') ? s.expected : '';
    const prep    = isDep ? 'to' : 'from';
    const dest    = isDep ? s.destination : s.origin;
    const detail  = s.lastSeen ? detailLabel(s.lastSeen) : '';

    return `<div class="card" onclick="openSheet(${tab === 0 ? 'depServices' : 'arrServices'}[${i}], ${tab})">
  <div class="card-row-top">
    <div class="card-time-group">
      <span class="card-time">${s.time}</span>${expTime ? `<span class="card-exp">Exp ${expTime}</span>` : ''}
    </div>
    <div class="card-chip-wrap">${chipHTML(chip)}</div>
  </div>
  <div class="card-row-route">
    <span class="card-prep">${prep}</span>
    <span class="card-dest">${dest}</span>
  </div>${detail ? `
  <div class="card-detail">${detail}</div>` : ''}
</div>`;
  }).join('');
}

/* ═══════════════════════════════
   BOTTOM SHEET
═══════════════════════════════ */

function buildNodeList(s, isDep) {
  const isLate      = /^\d{2}:\d{2}$/.test(s.expected || '');
  const isCancelled = (s.expected || '').toLowerCase() === 'cancelled';
  const activeColour = isLate ? 'warn' : '';

  /* Build full stop list: origin → prev stops → SWT → next stops → dest */
  const origin = isDep ? s.origin : s.origin;
  const dest   = isDep ? s.destination : s.destination;

  /* All stops in order */
  const allStops = [];

  /* Origin */
  const originPassed = s.prevPoints.length > 0 || s.nextPoints.length > 0;
  allStops.push({
    name:  origin,
    state: originPassed ? 'origin-started' : 'origin-unstarted',
  });

  /* Previous calling points — all passed */
  for (const pt of s.prevPoints) {
    allStops.push({ name: pt.name, state: 'passed' });
  }

  /* Slaithwaite — where we are */
  /* If train has previous points and is en-route, we're next */
  const atSWT = s.prevPoints.length > 0 && s.nextPoints.length > 0;
  if (atSWT) {
    allStops.push({ name: 'Slaithwaite', state: s.nextPoints.length === 0 ? 'reached' : 'reached' });
  }

  /* Subsequent calling points */
  for (let i = 0; i < s.nextPoints.length; i++) {
    const pt = s.nextPoints[i];
    const isLast = i === s.nextPoints.length - 1;
    if (isLast) {
      /* Final destination handled separately below */
      break;
    }
    allStops.push({ name: pt.name, state: 'unreached' });
  }

  /* Destination */
  const destReached = false; /* We never show the train as arrived at dest from this data */
  allStops.push({ name: dest, state: 'end-unreached' });

  /* Render */
  let html = '';
  for (let i = 0; i < allStops.length; i++) {
    const stop = allStops[i];
    const isLast = i === allStops.length - 1;

    /* Dot state */
    const dotCls = stop.state + (isLate && (stop.state === 'reached' || stop.state === 'origin-started') ? ' active' : '');

    /* Path state */
    let pathCls = '';
    if (!isLast) {
      const nextStop = allStops[i + 1];
      const thisDone = ['passed', 'origin-started', 'reached'].includes(stop.state);
      const nextDone = ['passed', 'reached'].includes(nextStop.state);
      if (thisDone && nextDone) pathCls = 'complete';
      else if (thisDone && !nextDone) pathCls = isLate ? 'warn-started' : 'started';
      else pathCls = 'unstarted';
    }

    /* Label style */
    const labelCls = ['unreached', 'end-unreached', 'origin-unstarted'].includes(stop.state) ? 'grey' : '';

    html += `<div class="node-row">
  <div class="node-track">
    <div class="node-dot ${dotCls}"></div>
    ${!isLast ? `<div class="node-path ${pathCls}"></div>` : ''}
  </div>
  <div class="node-label ${labelCls}">${stop.name}</div>
</div>`;
  }

  return html;
}

function openSheet(s, tab) {
  const isDep = tab === 0;
  const chip  = chipFor(s.expected);
  const expTime = /^\d{2}:\d{2}$/.test(s.expected || '') ? s.expected : '';

  document.getElementById('sheet-time').textContent = s.time;
  document.getElementById('sheet-exp').textContent  = expTime ? `Exp ${expTime}` : '';
  document.getElementById('sheet-direction').textContent = isDep ? 'Departing for' : 'Arriving from';
  document.getElementById('sheet-dest').textContent = isDep ? s.destination : s.origin;
  document.getElementById('sheet-chip-wrap').innerHTML = chipHTML(chip);
  document.getElementById('node-list').innerHTML = buildNodeList(s, isDep);

  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  document.body.style.overflow = '';
}

/* Swipe down to close sheet */
let sheetTouchY = 0;
document.getElementById('sheet').addEventListener('touchstart', e => {
  sheetTouchY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('sheet').addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - sheetTouchY;
  if (dy > 80) closeSheet();
}, { passive: true });

/* ── Load ── */
async function load() {
  document.getElementById('status-updated').textContent = 'Updating...';
  try {
    const [dr, ar] = await Promise.all([
      fetch(`${WORKER}/?crs=SWT&type=dep`),
      fetch(`${WORKER}/?crs=SWT&type=arr`),
    ]);
    const [dx, ax] = await Promise.all([dr.text(), ar.text()]);

    const deps = parseServices(dx, 'dep').sort((a, b) => a.sortKey.localeCompare(b.sortKey));
    const arrs = parseServices(ax, 'arr').sort((a, b) => a.sortKey.localeCompare(b.sortKey));

    /* Merge — arrs preferred (have both prev + next calling points) */
    const seen = new Set();
    const merged = [...arrs, ...deps].filter(s => {
      if (seen.has(s.serviceID)) return false;
      seen.add(s.serviceID); return true;
    }).sort((a, b) => a.sortKey.localeCompare(b.sortKey));

    depServices = merged;
    arrServices = merged;

    renderList(depServices, 'trains-dep', 0);
    renderList(arrServices, 'trains-arr', 1);

    const now = new Date();
    document.getElementById('status-updated').textContent =
      `Updated ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;

    updateBand();
    adjustTop();

  } catch(e) {
    document.getElementById('trains-dep').innerHTML = '<div class="message">Could not load trains.</div>';
    document.getElementById('status-updated').textContent = 'Failed';
    adjustTop();
  }
}

load();
setInterval(load, 60000);
</script>
