<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FFFFFF" id="theme-color">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Slaithwaite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { scrollbar-width: none; -ms-overflow-style: none; }
html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }

body {
  font-family: 'Onest', sans-serif;
  background: #00189F;
  min-height: 100vh;
}

.board {
  max-width: 393px;
  margin: 0 auto;
  min-height: 100vh;
  background: #fff;
  display: flex;
  flex-direction: column;
}

/* ── Fixed top (white header + colour band) ── */
.top {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 393px;
  z-index: 100;
}

/* ── White header ── */
.header {
  background: #fff;
  padding: calc(env(safe-area-inset-top) + 24px) 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.station {
  font-size: 34px;
  font-weight: 600;
  line-height: 1.206;
  color: #1A1A1A;
}

.tab-bar {
  display: flex;
  align-items: center;
  gap: 16px;
}

.tab-btn {
  font-family: 'Onest', sans-serif;
  font-size: 22px;
  font-weight: 400;
  line-height: 1.273;
  color: #767676;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
}
.tab-btn.active {
  font-weight: 600;
  color: #1A1A1A;
}

/* ── Colour status band ── */
.status-band {
  background: #00189F;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: background 0.4s ease;
}
.status-band.warn { background: #FFCA00; }
.status-band.bad  { background: #D3131A; }

.status-updated {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.3125;
  color: #fff;
}
.status-band.warn .status-updated { color: #1A1A1A; }

.status-text {
  font-size: 20px;
  font-weight: 400;
  line-height: 1.25;
  color: #fff;
  min-height: 1.25em;
}
.status-band.warn .status-text { color: #1A1A1A; }

/* ── Scrollable content (pushed below fixed top) ── */
.swipe-container {
  flex: 1;
  background: #fff;
  overflow: hidden;
}

.swipe-track {
  display: flex;
  width: 200%;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
}

.tab-panel {
  width: 50%;
  min-width: 0;
}

/* ── Train row ── */
.train {
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  border-top: 1px solid #F1F3F4;
}
.train:first-child { border-top: none; }

/* Row 1: time + status + platform */
.train-top {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 8px;
}
.train-time {
  font-size: 22px;
  font-weight: 600;
  line-height: 1.273;
  color: #1A1A1A;
  flex-shrink: 0;
}
.train-status {
  font-size: 20px;
  font-weight: 400;
  line-height: 1.25;
  color: #767676;
}
.train-status.delayed   { color: #C73232; }
.train-status.cancelled { color: #C73232; text-decoration: line-through; }

.train-platform {
  font-size: 20px;
  font-weight: 400;
  line-height: 1.25;
  color: #767676;
  margin-left: auto;
  flex-shrink: 0;
}

/* Row 2: route */
.train-route {
  font-size: 20px;
  font-weight: 400;
  line-height: 1.25;
  color: #767676;
}

/* ── States ── */
.message {
  padding: 24px;
  font-size: 20px;
  font-weight: 400;
  color: #767676;
  text-align: center;
}

/* ── Refresh ── */
.refresh-btn {
  display: block;
  width: calc(100% - 48px);
  margin: 0 24px 24px;
  padding: 14px;
  font-family: 'Onest', sans-serif;
  font-size: 16px;
  font-weight: 400;
  color: #767676;
  background: #F1F3F4;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}
.refresh-btn:active { opacity: 0.7; }
</style>
</head>
<body>
<div class="board">

  <!-- Fixed: white header + colour band -->
  <div class="top" id="top">
    <div class="header">
      <div class="station">Slaithwaite</div>
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-dep" onclick="switchTab(0)">Departing</button>
        <button class="tab-btn"        id="tab-arr" onclick="switchTab(1)">Arriving</button>
      </div>
    </div>
    <div class="status-band" id="status-band">
      <div class="status-updated" id="status-updated">Loading...</div>
      <div class="status-text"    id="status-text"></div>
    </div>
  </div>

  <!-- Scrollable content -->
  <div class="swipe-container" id="swipe-container">
    <div class="swipe-track" id="swipe-track">
      <div class="tab-panel">
        <div id="trains-dep"><div class="message">Fetching trains…</div></div>
        <button class="refresh-btn" onclick="load()">↻ Refresh</button>
      </div>
      <div class="tab-panel">
        <div id="trains-arr"><div class="message">Fetching trains…</div></div>
      </div>
    </div>
  </div>

</div>
<script>
'use strict';

const WORKER = 'https://icy-art-aabb.andybarratt.workers.dev';
let depServices = [];
let arrServices = [];
let activeTab   = 0;
let headerTimer = null;

/* ── Push content below fixed top ── */
function adjustTop() {
  const h = document.getElementById('top').offsetHeight;
  document.getElementById('swipe-container').style.marginTop = h + 'px';
}

/* ── Tab switching ── */
function switchTab(idx) {
  activeTab = idx;
  document.getElementById('tab-dep').classList.toggle('active', idx === 0);
  document.getElementById('tab-arr').classList.toggle('active', idx === 1);
  document.getElementById('swipe-track').style.transform =
    idx === 0 ? 'translateX(0)' : 'translateX(-50%)';
  clearTimeout(headerTimer);
  headerTimer = setTimeout(() => { updateBand(); adjustTop(); }, 500);
}

/* ── Swipe ── */
let tx = 0, ty = 0;
document.getElementById('swipe-container').addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
}, { passive: true });
document.getElementById('swipe-container').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0 && activeTab === 0) switchTab(1);
    if (dx > 0 && activeTab === 1) switchTab(0);
  }
}, { passive: true });

/* ── XML ── */
function getTag(xml, tag) {
  const m = xml.match(new RegExp(`<[^>]*:?${tag}[^>]*>([^<]*)<`));
  return m ? m[1].trim() : '';
}

function parseServices(xml, type) {
  const re = /<lt8:service>([\s\S]*?)<\/lt8:service>/g;
  const out = [];
  let m;
  while ((m = re.exec(xml)) !== null) {
    const s    = m[1];
    const dest = s.match(/<lt5:destination>[\s\S]*?<lt4:locationName>([^<]+)<\/lt4:locationName>/);
    const orig = s.match(/<lt5:origin>[\s\S]*?<lt4:locationName>([^<]+)<\/lt4:locationName>/);
    const time = getTag(s, 'sta') || getTag(s, 'std');

    /* Previous calling points */
    let lastSeen = null;
    const prev = s.match(/<lt8:previousCallingPoints>([\s\S]*?)<\/lt8:previousCallingPoints>/);
    if (prev) {
      const cpRe = /<lt8:callingPoint>([\s\S]*?)<\/lt8:callingPoint>/g;
      let cp;
      while ((cp = cpRe.exec(prev[1])) !== null) {
        const at  = (cp[1].match(/<lt8:at>([^<]+)<\/lt8:at>/)  || [])[1]?.trim() || '';
        const loc = (cp[1].match(/<lt8:locationName>([^<]+)<\/lt8:locationName>/) || [])[1]?.trim() || '';
        if (at && at !== 'No report' && loc) lastSeen = { loc, at };
      }
      const cps       = [...prev[1].matchAll(/<lt8:callingPoint>([\s\S]*?)<\/lt8:callingPoint>/g)];
      const stopsAway = cps.filter(c => !/<lt8:at>/.test(c[1])).length;
      if (lastSeen) lastSeen.stopsAway = stopsAway;
    }

    out.push({
      type, time,
      sortKey:     time.replace(':', ''),
      expected:    getTag(s, 'eta') || getTag(s, 'etd'),
      platform:    getTag(s, 'platform'),
      origin:      orig  ? orig[1]  : '',
      destination: dest  ? dest[1]  : '',
      serviceID:   getTag(s, 'serviceID'),
      lastSeen,
    });
  }
  return out;
}

/* ── Status text for a train ── */
function statusText(expected) {
  if (!expected) return { text: '', cls: '' };
  const lo = expected.toLowerCase();
  if (lo === 'on time')   return { text: 'On time',              cls: '' };
  if (lo === 'cancelled') return { text: 'Cancelled',            cls: 'cancelled' };
  return                         { text: `Expected ${expected}`, cls: 'delayed' };
}

/* ── Detail label (last seen) ── */
function detailLabel(ls, arrTime) {
  const stops   = ls.stopsAway;
  const isTime  = /^\d{2}:\d{2}$/.test(ls.at);
  if (stops === 0 && arrTime) {
    const nowMin = new Date().getHours() * 60 + new Date().getMinutes();
    const [ah, am] = arrTime.split(':').map(Number);
    const away = (ah * 60 + am) - nowMin;
    if (away <= 1) return 'Arriving soon';
    if (away < 60) return `Arriving in ${away} mins`;
  }
  const stopStr = stops === 0 ? 'next stop' : stops === 1 ? '1 stop to go' : `${stops} stops to go`;
  if (!isTime) return `Just departed ${ls.loc}, ${stopStr}`;
  const nowMin  = new Date().getHours() * 60 + new Date().getMinutes();
  const [h, mn] = ls.at.split(':').map(Number);
  const diff    = nowMin - (h * 60 + mn);
  const t       = diff <= 0 ? '' : diff === 1 ? ' 1 min ago' : diff < 60 ? ` ${diff} mins ago` : '';
  return `Departed ${ls.loc}${t}, ${stopStr}`;
}

/* ── Headline for band ── */
function headlineFor(services, tab) {
  if (!services.length) return { cls: '', text: '' };
  const toMins = t => { const [h, mn] = t.split(':').map(Number); return h * 60 + mn; };
  const nowMin = new Date().getHours() * 60 + new Date().getMinutes();
  const isDep  = tab === 0;

  const cancelled = services.filter(s => (s.expected || '').toLowerCase() === 'cancelled');
  const delayed   = services.filter(s => /^\d{2}:\d{2}$/.test(s.expected || ''));
  const upcoming  = services.filter(s => (s.expected || '').toLowerCase() !== 'cancelled')
                            .sort((a, b) => toMins(a.time) - toMins(b.time));
  const next = upcoming[0];

  if (cancelled.length && delayed.length) {
    const c = cancelled[0];
    const lbl = isDep ? `to ${c.destination}` : `from ${c.origin}`;
    return { cls: 'bad', text: `The ${c.time} ${lbl} is cancelled, and ${delayed.length} train${delayed.length > 1 ? 's are' : ' is'} delayed.` };
  }
  if (cancelled.length) {
    const c = cancelled[0];
    const lbl  = isDep ? `to ${c.destination}` : `from ${c.origin}`;
    const nxt  = next ? ` The ${next.time} ${isDep ? 'to ' + next.destination : 'from ' + next.origin} is your best bet.` : '';
    return { cls: 'bad', text: `The ${c.time} ${lbl} is cancelled.${nxt}` };
  }
  if (delayed.length) {
    const d   = delayed[0];
    const lbl = isDep ? `to ${d.destination}` : `from ${d.origin}`;
    return { cls: 'warn', text: `The ${d.time} ${lbl} is running late — now expected ${d.expected}.` };
  }
  if (next) {
    const away = toMins(next.time) - nowMin;
    const when = away <= 1 ? 'soon' : away < 60 ? `in ${away} mins` : `at ${next.time}`;
    const lbl  = isDep ? `to ${next.destination}` : `from ${next.origin}`;
    return { cls: '', text: `The ${next.time} ${lbl} is on time, Platform ${next.platform || '?'}, ${when}.` };
  }
  return { cls: '', text: '' };
}

/* ── Update colour band ── */
function updateBand() {
  const services = activeTab === 0 ? depServices : arrServices;
  const { cls, text } = headlineFor(services, activeTab);
  const band = document.getElementById('status-band');
  band.className = `status-band${cls ? ' ' + cls : ''}`;
  document.getElementById('status-text').textContent = text;
}

/* ── Render train list ── */
function renderList(services, elId, tab) {
  const el    = document.getElementById(elId);
  const isDep = tab === 0;
  if (!services.length) { el.innerHTML = '<div class="message">No trains found</div>'; return; }

  el.innerHTML = services.map(s => {
    const st     = statusText(s.expected);
    const route  = isDep ? `to ${s.destination}` : `from ${s.origin}`;
    const detail = s.lastSeen ? detailLabel(s.lastSeen, s.time) : '';
    return `<div class="train">
  <div class="train-top">
    <span class="train-time">${s.time}</span>
    <span class="train-status ${st.cls}">${st.text}</span>
    ${s.platform ? `<span class="train-platform">Platform ${s.platform}</span>` : ''}
  </div>
  <div class="train-route">${route}</div>${detail ? `
  <div class="train-route">${detail}</div>` : ''}
</div>`;
  }).join('');
}

/* ── Load ── */
async function load() {
  document.getElementById('status-updated').textContent = 'Updating...';
  try {
    const [dr, ar] = await Promise.all([
      fetch(`${WORKER}/?crs=SWT&type=dep`),
      fetch(`${WORKER}/?crs=SWT&type=arr`),
    ]);
    const [dx, ax] = await Promise.all([dr.text(), ar.text()]);

    depServices = parseServices(dx, 'dep').sort((a, b) => a.sortKey.localeCompare(b.sortKey));
    arrServices = parseServices(ax, 'arr').sort((a, b) => a.sortKey.localeCompare(b.sortKey));

    /* Arrs preferred (have previousCallingPoints) — dedup by serviceID */
    const seen = new Set();
    const merged = [...arrServices, ...depServices].filter(s => {
      if (seen.has(s.serviceID)) return false;
      seen.add(s.serviceID); return true;
    }).sort((a, b) => a.sortKey.localeCompare(b.sortKey));

    depServices = merged;
    arrServices = merged;

    renderList(depServices, 'trains-dep', 0);
    renderList(arrServices, 'trains-arr', 1);

    const now = new Date();
    document.getElementById('status-updated').textContent =
      `Updated ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;

    updateBand();
    adjustTop();

  } catch(e) {
    document.getElementById('trains-dep').innerHTML = '<div class="message">Could not load trains.</div>';
    document.getElementById('status-updated').textContent = 'Failed';
    adjustTop();
  }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
